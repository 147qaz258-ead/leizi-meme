<script>
(function () {
  const API_ORIGIN = window.location.protocol === 'file:' ? 'http://127.0.0.1:8765' : window.location.origin;
  const kingReplies = [
    '那咋了 🫠 累就累了，打工人的尊严不就是一瓶肥宅快乐水吗',
    '班味浓到能腌菜了家人们 🥬 建议下班对着天花板骂三分钟再睡',
    '啊这 我给你扬了 💀 class is class 你能咋办',
    'city不city啊？你这日子过得 特别不city',
    '哈基米～哈基米～ 南北绿豆 豆豆冰 🍯 整一杯 续命',
    '孤勇者本勇 早八赶地铁 照样光里发光 ⚔️',
  ];
  const dialectReplies = [
    '嘎嘎累是吧？那咋地 老铁这班上的跟三班倒似的 整口儿吧！',
    '哎妈呀 这班上得跟大棚种菜似的 走 老铁 撸串去！',
    '整点儿活儿呗 老铁 这玩意儿有啥好愁的 🧊',
    '唠嗑啊兄弟 这日子过得跟过年似的 顿顿都是硬菜',
  ];
  const classicalReplies = [
    '劳则怨，怨则躺，躺则愈累。此乃"班味"之循环，古已有之，无解也 🍃',
    '子曰：朝九晚十，非人哉！卿可效法陶令，不为五斗米折腰，然五斗米实在香 💰',
    '诸君莫愁，班者，搬也；薪者，辛也。古之打工，今之吾辈，皆然 📜',
  ];
  const memeComments = [
    '这不就我的日常.jpg',
    '那咋了 🫠 班味就这味儿',
    '家人们谁懂啊 💀',
    '打工人的精神状态.gif',
    '孤勇者本勇路过',
    'city不city我不好说',
  ];
  const genLines = [
    '那咋了 🫠',
    '班味浓郁 建议冷冻',
    '家人们 谁懂啊 💀',
    '吗喽的命也是命',
    '哈基米 续一秒',
    '周五请假专业户',
    '上班上成电子民工',
    '精神离职进行时',
  ];

  function pick(arr, n) {
    const pool = arr.slice().sort(() => Math.random() - 0.5);
    return pool.slice(0, n);
  }

  function isClassical(p) { return /文言|子曰|之乎/.test(p); }
  function isDialect(p) { return /东北|老铁|嘎嘎|整活/.test(p); }

  async function mockComplete(prompt) {
    await new Promise(r => setTimeout(r, 400 + Math.random() * 300));
    if (/评分|JSON|grade/i.test(prompt)) {
      const grades = ['A+', 'A', 'A', 'B', 'B', 'C'];
      const g = grades[Math.floor(Math.random() * grades.length)];
      const rand = (lo, hi) => Math.round(lo + Math.random() * (hi - lo));
      const baseLo = g === 'A+' ? 85 : g === 'A' ? 75 : g === 'B' ? 60 : 40;
      const baseHi = g === 'A+' ? 99 : g === 'A' ? 90 : g === 'B' ? 80 : 65;
      const comments = {
        'A+': '绝了 这梗我吞了',
        'A': '梗味够浓 下次还来',
        'B': '差点意思 再发酵一下',
        'C': '这梗凉了 回去再炼',
      };
      return JSON.stringify({
        grade: g,
        humor: rand(baseLo, baseHi),
        contrast: rand(baseLo, baseHi),
        fit: rand(baseLo, baseHi),
        comment: comments[g],
      });
    }
    if (/回评|3个|三个|每句|梗图文案/.test(prompt)) {
      return pick(memeComments.concat(genLines), 3).join('\n');
    }
    let pool = kingReplies;
    if (isDialect(prompt)) pool = dialectReplies;
    else if (isClassical(prompt)) pool = classicalReplies;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  async function request(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    const res = await fetch(API_ORIGIN + path, { ...options, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    return data;
  }

  function assetUrl(path) {
    if (!path) return '';
    if (/^(data:|https?:)/i.test(path)) return path;
    // Support non-ascii filenames (e.g. 微信图片_*.jpg) without breaking static file serving.
    return API_ORIGIN + encodeURI(path);
  }

  window.MockClaude = { complete: mockComplete };
  window.claude = { complete: mockComplete };
  window.MemeLabAPI = {
    origin: API_ORIGIN,
    assetUrl,
    getBootstrap() { return request('/api/bootstrap', { method: 'GET' }); },
    getPosts(tag, view = 'all') {
      const params = new URLSearchParams();
      if (tag && tag !== 'all') params.set('tag', tag);
      if (view && view !== 'all') params.set('view', view);
      const qs = params.toString() ? ('?' + params.toString()) : '';
      return request('/api/posts' + qs, { method: 'GET' });
    },
    getMyProfile() { return request('/api/users/me/profile', { method: 'GET' }); },
    getUserProfile(userId) { return request('/api/users/' + encodeURIComponent(userId) + '/profile', { method: 'GET' }); },
    toggleFollow(userId) { return request('/api/users/' + encodeURIComponent(userId) + '/follow', { method: 'POST', body: '{}' }); },
    getHotComments(limit = 12) { return request('/api/hot-comments?limit=' + encodeURIComponent(limit), { method: 'GET' }); },
    sendChat(payload) { return request('/api/chat/reply', { method: 'POST', body: JSON.stringify(payload) }); },
    laughPost(postId) { return request('/api/posts/' + postId + '/laugh', { method: 'POST', body: '{}' }); },
    favoritePost(postId) { return request('/api/posts/' + postId + '/favorite', { method: 'POST', body: '{}' }); },
    explainMeme(text) { return request('/api/chat/explain', { method: 'POST', body: JSON.stringify({ text }) }); },
    getComments(postId) { return request('/api/posts/' + postId + '/comments', { method: 'GET' }); },
    getCommentSuggestions(postId) { return request('/api/posts/' + postId + '/comments/suggestions', { method: 'POST', body: '{}' }); },
    postComment(postId, text) { return request('/api/posts/' + postId + '/comments', { method: 'POST', body: JSON.stringify({ text }) }); },
    generate(payload) { return request('/api/generate', { method: 'POST', body: JSON.stringify(payload) }); },
    critiqueMeme(memeId) { return request('/api/generate/' + memeId + '/critique', { method: 'POST', body: '{}' }); },
    publishMeme(memeId) { return request('/api/generate/' + memeId + '/publish', { method: 'POST', body: '{}' }); },
    shareMeme(memeId) { return request('/api/generate/' + memeId + '/share', { method: 'POST', body: '{}' }); },
    getGameLevels() { return request('/api/game/levels', { method: 'GET' }); },
    scoreGame(payload) { return request('/api/game/score', { method: 'POST', body: JSON.stringify(payload) }); },
  };
})();
</script>

function RotatingCTA({ text, centerEmoji = '▶', onClick, size = 120 }) {
  const chars = (text + ' ').split('');
  const N = chars.length;
  const R = size / 2 - 8;
  return (
    <button
      onClick={onClick}
      style={{
        position: 'relative', width: size, height: size, borderRadius: '50%',
        border: '1.5px solid #E0E0E0', background: 'transparent',
        transition: 'transform 120ms',
      }}
      onMouseDown={e => e.currentTarget.style.transform = 'scale(0.94)'}
      onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
      onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
      className="no-select"
    >
      <div className="spin-text" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
        {chars.map((c, i) => {
          const angle = (i / N) * 360;
          return (
            <span key={i} style={{
              position: 'absolute', left: '50%', top: '50%',
              transform: `translate(-50%, -50%) rotate(${angle}deg) translateY(-${R}px)`,
              fontSize: 11, fontWeight: 700, letterSpacing: '0.5px',
              color: '#888', textTransform: 'uppercase',
            }}>{c}</span>
          );
        })}
      </div>
      <div style={{
        position: 'absolute', left: '50%', top: '50%',
        transform: 'translate(-50%, -50%)',
        width: size * 0.66, height: size * 0.66, borderRadius: '50%',
        background: '#fff',
        boxShadow: '0 4px 14px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 28,
      }}>{centerEmoji}</div>
    </button>
  );
}

  const [messages, setMessages] = React.useState([

  ]);
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const [showPersonaSwitch, setShowPersonaSwitch] = React.useState(false);

  React.useEffect(() => {
    setMessages([{ role: 'bot', text: persona.greeting, id: 'p-' + persona.key }]);
  }, [persona.key]);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, typing]);

  async function send(text) {
    if (!text.trim()) return;
    const uid = 'u' + Date.now();
    setMessages(m => [...m, { role: 'user', text, id: uid }]);
    setInput('');
    setTyping(true);

    let reply = '';
    let replyMeta = null;
    const started = Date.now();
    try {
      const response = await window.MemeLabAPI.sendChat({
        personaKey: persona.key,
        text,
        history: messages.slice(-6).map(msg => ({ role: msg.role, text: msg.text })),
      });
      const elapsed = Date.now() - started;
      const minTypingMs = 900;
      if (elapsed < minTypingMs) await new Promise(r => setTimeout(r, minTypingMs - elapsed));
      reply = (response.reply || '').trim().replace(/^梗王[：:]\s*/, '');
      replyMeta = {
        source: response.source || 'unknown',
        model: response.model || '',
        latencyMs: response.latencyMs || 0,
      };
      onProfileSync(response.profile, 5);
    } catch (e) {
      const samples = persona.samples.map(s => `用户：${s.user}\n梗王：${s.bot}`).join('\n\n');
      const prompt = `你现在扮演"梗王"。性格：${persona.style}。\n参考样例：\n${samples}\n用户说：${text}\n梗王：`;

      replyMeta = { source: 'mock', model: 'local-mock', latencyMs: 0 };
      onProfileSync(null, 5);

    setTyping(false);
    setMessages(m => [...m, { role: 'bot', text: reply || '那咋了 🫠', id: 'b' + Date.now(), meta: replyMeta }]);
  }

  const quickReplies = ['今天好累', '老板又PUA我', '帮我想一个周五下班的梗', '给我一个哈基米版本的早安'];

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>

              吾乃{persona.name}

            <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginTop: 4 }}>
              {persona.subtitle}
            </div>
          </div>
          <button onClick={() => setShowPersonaSwitch(true)} style={{
            width: 40, height: 40, borderRadius: '50%',
            background: '#F0F0F0', display: 'flex',
            alignItems: 'center', justifyContent: 'center', fontSize: 18,
          }}>🎭</button>
        </div>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '4px 20px 12px' }}>
        <div className="bob" style={{ flexShrink: 0 }}>
          <DogeAvatar size={88} expression="smirk"/>
        </div>
        <div className="grad-border" style={{ flex: 1, padding: '12px 14px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 11, color: '#888', fontWeight: 600 }}>今日梗值</div>

        flex: 1, overflowY: 'auto', padding: '8px 16px 16px',

      }}>

  const socialTabs = [
    { key: 'all', label: '全部动态' },
    { key: 'following', label: '关注' },
    { key: 'liked', label: '已赞' },
    { key: 'mine', label: '我发的' },
  ];

  const lowerQuery = (query || '').trim().toLowerCase();
  let visible = filter === 'all' ? posts : posts.filter(p => p.tag === filter);
  if (lowerQuery) {
    visible = visible.filter(p => {
      const hay = [
        p.author, p.caption, p.template, p.tag, p.sourceLabel, p.memeLabel,
      ].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(lowerQuery);
    });
  }
  if (sort === 'hot') {
    visible = visible.slice().sort((a, b) => (b.stats?.laugh || 0) - (a.stats?.laugh || 0));
  } else if (sort === 'comment') {
    visible = visible.slice().sort((a, b) => (b.stats?.comments || 0) - (a.stats?.comments || 0));
  } else {
    visible = visible.slice().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
  }
  function replacePost(nextPost) {
    setPosts(ps => ps.map(p => p.id === nextPost.id ? { ...p, ...nextPost, laughed: nextPost.laughed ?? p.laughed } : p));
  }

  async function openProfile(userId) {
    setProfileLoading(true);
    setProfileUser(null);
    try {
      const response = userId === 'me'
        ? await window.MemeLabAPI.getMyProfile()
        : await window.MemeLabAPI.getUserProfile(userId);
      if (response?.profile) setProfileUser(response.profile);
    } finally {
      setProfileLoading(false);
    }
  }

  async function openHotCommentsSheet() {
    setShowHotComments(true);
    setLoadingHotComments(true);
    try {
      const response = await window.MemeLabAPI.getHotComments(12);
      setHotComments(response.comments || []);
    } catch (e) {
      setHotComments([]);
    } finally {
      setLoadingHotComments(false);
    }
  }

  async function toggleFollow(userId) {
    if (!userId) return;
    try {
      const response = await window.MemeLabAPI.toggleFollow(userId);
      if (response?.profile) setProfileUser(response.profile);
      if (feedView === 'following') {
        const listResponse = await window.MemeLabAPI.getPosts(null, 'following');
        setPosts(listResponse.posts || []);
      }
    } catch (e) {}
  }

  function openPost(post) {
    setShowHotComments(false);
    setDetailPost(post);
  }

  async function laugh(id) {
    try {
      const response = await window.MemeLabAPI.laughPost(id);
      replacePost({ ...response.post, laughed: true });
      onProfileSync(response.profile, 2);
    } catch (e) {
      setPosts(ps => ps.map(p => p.id === id
        ? { ...p, stats: { ...p.stats, laugh: p.stats.laugh + 1 }, laughed: true }
        : p));
      onProfileSync(null, 2);
    }
  }

  async function favorite(id) {
    try {
      const response = await window.MemeLabAPI.favoritePost(id);
      replacePost({ ...response.post, favored: true });
      onProfileSync(response.profile, 1);
    } catch (e) {
      setPosts(ps => ps.map(p => p.id === id
        ? { ...p, stats: { ...p.stats, shares: p.stats.shares + 1 }, favored: true }
        : p));
      onProfileSync(null, 1);
    }
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#FAFAFB', position: 'relative' }}>
      <div style={{ padding: '10px 18px 8px', background: '#FAFAFB', position: 'sticky', top: 0, zIndex: 5 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10 }}>
          <div>
            <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: '-0.3px' }}>广场 🔥</div>
            <div style={{ fontSize: 12, color: '#888', marginTop: 2 }}>刷的是梗，评的也是梗</div>
          </div>
          <button onClick={() => setShowSheet(true)} style={{
            width: 42, height: 42, borderRadius: '50%',
            background: '#fff', boxShadow: 'var(--shadow-card)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 24, fontWeight: 500, color: '#1A1A1A', flexShrink: 0,
          }}>+</button>
        </div>
        <div className="no-scroll" style={{ display: 'flex', gap: 8, overflowX: 'auto', marginTop: 12, paddingBottom: 4 }}>
          {socialTabs.map(item => (
            <button key={item.key} onClick={() => setFeedView(item.key)} style={{
              flexShrink: 0, padding: '7px 12px', borderRadius: 999, fontSize: 12, fontWeight: 700,
              background: feedView === item.key ? '#1A1A1A' : '#F0F0F0',
              color: feedView === item.key ? '#fff' : '#666',
            }}>{item.label}</button>
          ))}
          <button onClick={openHotCommentsSheet} style={{
            flexShrink: 0, padding: '7px 12px', borderRadius: 999, fontSize: 12, fontWeight: 700,
            background: '#FFF4E8', color: '#C46B00',
          }}>热门评论</button>
        </div>
        <div className="no-scroll" style={{
          display: 'flex', gap: 8, overflowX: 'auto',
          marginTop: 12, paddingBottom: 4,
        }}>
          {filters.map(f => (
            <button key={f.key} onClick={() => setFilter(f.key)} style={{
              flexShrink: 0,
              padding: '7px 14px', borderRadius: 999, fontSize: 12, fontWeight: 600,
              background: filter === f.key ? '#1A1A1A' : '#F0F0F0',
              color: filter === f.key ? '#fff' : '#888',
              transition: 'all 0.2s',
            }}>{f.label}</button>
          ))}
        </div>
        <div style={{
          display: 'flex', gap: 10, alignItems: 'center',
          marginTop: 10,
        }}>
          <div style={{
            flex: 1, display: 'flex', alignItems: 'center', gap: 8,
            background: '#fff', border: '1px solid #E8E8E8', borderRadius: 999,
            padding: '6px 12px',
          }}>
            <span style={{ fontSize: 14, color: '#AAA' }}>🔎</span>
            <input
              value={query}
              onChange={e => setQuery(e.target.value)}
              placeholder="搜作者/文案/来源社区/模板…"
              style={{ flex: 1, border: 'none', outline: 'none', fontSize: 13, background: 'transparent' }}
            />
            {query && (
              <button onClick={() => setQuery('')} style={{ fontSize: 12, color: '#888' }}>清空</button>
            )}
          </div>
          <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
            <button onClick={() => setSort('new')} style={{
              padding: '7px 10px', borderRadius: 999, fontSize: 12, fontWeight: 700,
              background: sort === 'new' ? '#1A1A1A' : '#F0F0F0',
              color: sort === 'new' ? '#fff' : '#666',
            }}>最新</button>
            <button onClick={() => setSort('hot')} style={{
              padding: '7px 10px', borderRadius: 999, fontSize: 12, fontWeight: 700,
              background: sort === 'hot' ? '#1A1A1A' : '#F0F0F0',
              color: sort === 'hot' ? '#fff' : '#666',
            }}>最热</button>
            <button onClick={() => setSort('comment')} style={{
              padding: '7px 10px', borderRadius: 999, fontSize: 12, fontWeight: 700,
              background: sort === 'comment' ? '#1A1A1A' : '#F0F0F0',
              color: sort === 'comment' ? '#fff' : '#666',
            }}>热评</button>
          </div>
        </div>
      </div>

      <div className="no-scroll" style={{
        flex: 1, overflowY: 'auto',
        padding: '8px 16px 112px',
        display: 'flex', flexDirection: 'column', gap: 14,
      }}>
        {loading && posts.length === 0 && (
          <div style={{ padding: 18, textAlign: 'center', color: '#888', fontSize: 13 }}>广场加载中…</div>
        )}
        {!loading && visible.length === 0 && (
          <div style={{ padding: 18, textAlign: 'center', color: '#888', fontSize: 13 }}>
            没搜到相关内容，换个关键词试试？
          </div>
        )}
        {visible.map(p => (
          <PostCard
            key={p.id}
            post={p}
            onLaugh={() => laugh(p.id)}
            onFavorite={() => favorite(p.id)}
            onOpenAuthor={() => openProfile(p.authorId)}
            onRemix={() => onOpenGen({
              mode: 'template',
              input: `用 ${p.template} 做一个关于${p.caption.replace(/\n/g, ' ').slice(0, 18)}的梗`,
              templateName: p.template,
            })}
            onOpenDetail={() => setDetailPost(p)}
          />
        ))}
      </div>

      {showSheet && <PostSheet onClose={() => setShowSheet(false)} onGen={intent => { setShowSheet(false); onOpenGen(intent); }}/>}
      {(profileUser || profileLoading) && (
        <UserProfileSheet
          profile={profileUser}
          loading={profileLoading}
          onClose={() => { setProfileUser(null); setProfileLoading(false); }}
          onToggleFollow={toggleFollow}
          onOpenPost={openPost}
        />
      )}
      {showHotComments && (
        <HotCommentsSheet
          comments={hotComments}
          loading={loadingHotComments}
          onClose={() => setShowHotComments(false)}
          onOpenPost={openPost}
          onOpenUser={openProfile}
        />
      )}
      {detailPost && <PostDetail post={detailPost} onClose={() => setDetailPost(null)} onProfileSync={onProfileSync}/>}
    </div>
  );
}

function PostCard({ post, onLaugh, onOpenDetail, onRemix, onFavorite, onOpenAuthor }) {
  return (
    <div className="pop-in" style={{
      display: 'flex', flexDirection: 'column', flexShrink: 0,
      background: '#fff', borderRadius: 20, overflow: 'hidden',
      boxShadow: 'var(--shadow-card)',
    }}>
      <div style={{ padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <button onClick={onOpenAuthor} style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1, minWidth: 0, textAlign: 'left' }}>
          <div style={{
            width: 36, height: 36, borderRadius: '50%',
            background: post.bg, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 20,
          }}>{post.avatar}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ fontSize: 13, fontWeight: 700, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>@{post.author}</div>
            <LevelTag level={post.level}/>
          </div>
          <div style={{ fontSize: 11, color: '#888', marginTop: 2, display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
            <Badge accent={post.accent}>{post.tag}</Badge>
            {post.followingAuthor && <Badge accent="green">已关注</Badge>}
            {post.mine && <Badge accent="purple">我发的</Badge>}
            <span>· {post.time}</span>
          </div>
        </button>
      </div>

      <MemeArtwork assetPath={post.assetPath} label={post.memeLabel} aspect="1/1" bg={post.bg}/>

      <div style={{ padding: '12px 16px 10px', fontSize: 14, lineHeight: 1.55, whiteSpace: 'pre-line' }}>
        {post.caption}
        {(post.sourceLabel || post.source) && (
          <div style={{ marginTop: 8 }}>
            <Badge accent="amber">📎 {post.sourceLabel || post.source}</Badge>
          </div>
        )}
      </div>

      <div style={{ display: 'flex', borderTop: '1px solid #F0F0F0' }}>
        <ActionBtn icon="😂" label={post.stats.laugh} active={post.laughed} onClick={onLaugh}/>
        <ActionBtn icon="💬" label="用梗评" onClick={onOpenDetail}/>
        <ActionBtn icon="🎨" label="二创" onClick={onRemix}/>
        <ActionBtn icon="♡" label={post.stats.shares} active={post.favored} onClick={onFavorite}/>
      </div>
    </div>
  );
}

function ActionBtn({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      flex: 1, padding: '10px 0',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
      fontSize: 12, color: active ? 'var(--red)' : '#666',
      fontWeight: active ? 700 : 500,
    }}>
      <span style={{ fontSize: 15 }}>{icon}</span>
      <span>{label}</span>
    </button>
  );
}

function PostDetail({ post, onClose, onProfileSync }) {
  const [comments, setComments] = React.useState([]);
  const [aiSuggestions, setAiSuggestions] = React.useState([]);
  const [loadingAI, setLoadingAI] = React.useState(false);
  const [customComment, setCustomComment] = React.useState('');
  const [explaining, setExplaining] = React.useState(false);
  const [explanation, setExplanation] = React.useState('');

  React.useEffect(() => {
    let alive = true;
    window.MemeLabAPI.getComments(post.id)
      .then(({ comments: nextComments }) => {
        if (alive && nextComments?.length) setComments(nextComments);
      })
      .catch(() => {})
    return () => { alive = false; };
  }, [post.id]);

  async function loadAISuggestions() {
    setLoadingAI(true);
    try {
      const response = await window.MemeLabAPI.getCommentSuggestions(post.id);
      setAiSuggestions(response.suggestions?.length ? response.suggestions : ['这不就我的日常.jpg', '那咋了 🫠 班味就这味儿', '家人们谁懂啊']);
    } catch (e) {
      setAiSuggestions(['这不就我的日常.jpg', '那咋了 🫠 班味就这味儿', '家人们谁懂啊']);
    }
    setLoadingAI(false);
  }

  async function postComment(text) {
    if (!text.trim()) return;
    try {
      const response = await window.MemeLabAPI.postComment(post.id, text);
      setComments(response.comments || comments);
      onProfileSync(response.profile, response.comment?.topPick ? 20 : 10);
    } catch (e) {
      setComments(cs => [{ id: 'nc' + Date.now(), author: '我', avatar: '😎', text, votes: 0, justPosted: true }, ...cs]);
      onProfileSync(null, 10);
    }
    setCustomComment('');
  }

  async function loadExplanation() {
    setExplaining(true);
    try {
      const response = await window.MemeLabAPI.explainMeme(post.caption);
      setExplanation(response.explanation || '这梗主打一个情绪反差，越认真越好笑。');
    } catch (e) {
      setExplanation('这梗主打一个反差感，越像真实监控回放越有味儿。');
    }
    setExplaining(false);
  }

  return (
    <div className="fade-in" style={{
      position: 'absolute', inset: 0, zIndex: 90, background: 'rgba(0,0,0,0.5)',
    }} onClick={onClose}>
      <div className="slide-up" onClick={e => e.stopPropagation()} style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, top: 40,
        background: '#FAFAFB', borderRadius: '28px 28px 0 0',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ width: 40, height: 4, background: '#E0E0E0', borderRadius: 999, margin: '10px auto 4px' }}/>

        <div className="no-scroll" style={{ flex: 1, overflowY: 'auto', padding: '8px 16px 16px' }}>
          <div style={{
            background: '#fff', borderRadius: 16, padding: 12,
            display: 'flex', gap: 10, alignItems: 'center',
            boxShadow: 'var(--shadow-card)',
          }}>
            <div style={{ width: 48, height: 48, flexShrink: 0, borderRadius: 10, overflow: 'hidden' }}>
              <MemeArtwork assetPath={post.assetPath} label={post.avatar} aspect="1/1" bg={post.bg}/>
            </div>
            <div style={{ flex: 1, fontSize: 13, lineHeight: 1.4, whiteSpace: 'pre-line' }}>{post.caption}</div>
          </div>

          <div style={{
            marginTop: 14, padding: '10px 14px',
            background: 'linear-gradient(90deg, #FFF7E6, #FFEDC2)',
            borderRadius: 14, fontSize: 12, fontWeight: 600, color: '#8B6914',
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <span>⚠️</span>
            <span>评论区只收梗，不收人话。没灵感？让AI帮你想。</span>
          </div>

          <div style={{ marginTop: 10, display: 'flex', gap: 8 }}>
            <button onClick={loadExplanation} disabled={explaining} style={{
              padding: '8px 12px', borderRadius: 999, background: '#F0EBFA',
              color: 'var(--purple)', fontSize: 12, fontWeight: 700,
            }}>{explaining ? '梗王分析中…' : '🧠 这梗啥意思？'}</button>
            {post.assetPath && (
              <Badge accent="blue">真实图素材</Badge>
            )}
            {post.sourceUrl && /^https?:/i.test(post.sourceUrl) && (
              <button onClick={() => window.open(post.sourceUrl, '_blank', 'noopener,noreferrer')} style={{
                padding: '8px 12px', borderRadius: 999, background: '#FFF4E8',
                color: '#C46B00', fontSize: 12, fontWeight: 700,
              }}>🔗 看原帖</button>
            )}
          </div>

          {explanation && (
            <div style={{
              marginTop: 10, padding: '12px 14px', borderRadius: 14,
              background: '#F4F7FF', color: '#365E9B', fontSize: 13, lineHeight: 1.6,
            }}>
              {explanation}
            </div>
          )}

          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#888', marginBottom: 10 }}>
              梗评 · {comments.length}
            </div>
            {comments.map(c => <CommentCard key={c.id} comment={c}/>)}
          </div>
        </div>

        <div style={{ borderTop: '1px solid #EEE', background: '#fff', padding: '10px 16px 12px' }}>
          {aiSuggestions.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: 'var(--blue)', fontWeight: 700, marginBottom: 6 }}>
                🤖 AI 给你3个梗，选一个回？
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {aiSuggestions.map((s, i) => (
                  <button key={i} onClick={() => postComment(s)} className="pop-in" style={{
                    textAlign: 'left', padding: '8px 12px',
                    background: '#F0F6FF', border: '1px solid #D5E6FB',
                    borderRadius: 12, fontSize: 13, color: '#1A1A1A',
                  }}>{s}</button>
                ))}
              </div>
            </div>
          )}
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={loadAISuggestions} disabled={loadingAI} style={{
              padding: '8px 12px', borderRadius: 999,
              background: loadingAI ? '#E0E0E0' : '#F0F6FF',
              color: 'var(--blue)', fontSize: 12, fontWeight: 700, flexShrink: 0,
            }}>{loadingAI ? 'AI想中…' : '🤖 AI帮我想'}</button>
            <input
              value={customComment}
              onChange={e => setCustomComment(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && postComment(customComment)}
              placeholder="自己来一个梗…"
              style={{
                flex: 1, padding: '8px 12px', border: '1px solid #E5E5E5',
                borderRadius: 999, fontSize: 13, outline: 'none',
              }}/>
            <button onClick={() => postComment(customComment)} style={{
              padding: '8px 14px', borderRadius: 999,
              background: customComment.trim() ? 'var(--purple)' : '#DDD',
              color: '#fff', fontSize: 13, fontWeight: 700, flexShrink: 0,
            }}>发</button>
          </div>
          <button onClick={onClose} style={{
            marginTop: 10, width: '100%', padding: 10, fontSize: 12, color: '#888',
          }}>关闭</button>
        </div>
      </div>
    </div>
  );
}

function CommentCard({ comment }) {
  return (
    <div className={comment.justPosted ? 'pop-in' : ''} style={{
      background: '#fff', borderRadius: 14, padding: 12, marginBottom: 8,
      position: 'relative', boxShadow: 'var(--shadow-card)',
    }}>
      {comment.topPick && (
        <div style={{
          position: 'absolute', top: -8, left: 12,
          background: 'linear-gradient(90deg, #FFD700, #FFA500)',
          color: '#fff', fontSize: 10, fontWeight: 800,
          padding: '3px 10px', borderRadius: 999, letterSpacing: '0.3px',
        }}>✨ 梗中梗</div>
      )}
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
        <div style={{
          width: 32, height: 32, borderRadius: '50%', background: '#F5F5F5',
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16,
          flexShrink: 0,
        }}>{comment.avatar}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#666' }}>@{comment.author}</div>
          <div style={{ fontSize: 14, marginTop: 4, lineHeight: 1.5 }}>{comment.text}</div>
          <div style={{ fontSize: 11, color: '#AAA', marginTop: 6, display: 'flex', gap: 12 }}>
            <span>👍 {comment.votes}</span>
            <span>回复</span>

}

function MiniStat({ value, label }) {
  return (
    <div style={{ background: '#F7F7F8', borderRadius: 12, padding: '8px 6px', textAlign: 'center' }}>
      <div style={{ fontSize: 16, fontWeight: 800 }}>{value}</div>
      <div style={{ fontSize: 10, color: '#888', marginTop: 2 }}>{label}</div>
    </div>
  );
}

function UserProfileSheet({ profile, loading, onClose, onToggleFollow, onOpenPost }) {
  return (
    <div className="fade-in" style={{ position: 'absolute', inset: 0, zIndex: 105, background: 'rgba(0,0,0,0.45)' }} onClick={onClose}>
      <div className="slide-up" onClick={e => e.stopPropagation()} style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, top: 60,
        background: '#FAFAFB', borderRadius: '28px 28px 0 0', display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ width: 40, height: 4, background: '#E0E0E0', borderRadius: 999, margin: '10px auto 4px' }}/>
        <div className="no-scroll" style={{ flex: 1, overflowY: 'auto', padding: '12px 16px 20px' }}>
          {loading && !profile && (
            <div style={{ padding: 20, textAlign: 'center', color: '#888', fontSize: 13 }}>主页加载中…</div>
          )}
          {profile && (
            <>
              <div style={{ background: '#fff', borderRadius: 18, padding: 16, boxShadow: 'var(--shadow-card)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
                  <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                    <div style={{
                      width: 52, height: 52, borderRadius: '50%', background: '#F0EBFA',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24,
                    }}>{profile.avatar}</div>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 800 }}>@{profile.userName}</div>
                      <div style={{ fontSize: 12, color: '#888', marginTop: 4, lineHeight: 1.5 }}>{profile.bio || '这个人很神秘，主页正在补梗。'}</div>
                    </div>
                  </div>
                  {!profile.isMe && (
                    <button onClick={() => onToggleFollow(profile.id)} style={{
                      padding: '8px 14px', borderRadius: 999,
                      background: profile.isFollowing ? '#F0F0F0' : '#1A1A1A',
                      color: profile.isFollowing ? '#555' : '#fff', fontSize: 12, fontWeight: 700, flexShrink: 0,
                    }}>{profile.isFollowing ? '已关注' : '关注'}</button>
                  )}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginTop: 14 }}>
                  <MiniStat value={profile.counts?.posts || 0} label="发帖"/>
                  <MiniStat value={profile.counts?.followers || 0} label="粉丝"/>
                  <MiniStat value={profile.counts?.following || 0} label="关注"/>
                  <MiniStat value={profile.counts?.liked || 0} label="获赞"/>
                </div>

// ========== screen-gen.jsx ==========
function Generator({ onProfileSync, goBack, onOpenPlaza, initialIntent, level }) {
  const [mode, setMode] = React.useState('text');
  const [input, setInput] = React.useState('');
  const [style, setStyle] = React.useState('yy');
  const [generating, setGenerating] = React.useState(false);
  const [results, setResults] = React.useState([]);
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [selectedTpl, setSelectedTpl] = React.useState(GEN_TEMPLATES[0]);
  const [selectedImage, setSelectedImage] = React.useState(null);
  const [selectedImageName, setSelectedImageName] = React.useState('');
  const [reviewText, setReviewText] = React.useState('');
  const [actionLoading, setActionLoading] = React.useState('');
  const fileInputRef = React.useRef(null);

  React.useEffect(() => {
    if (!initialIntent) return;
    if (initialIntent.mode) setMode(initialIntent.mode);
    if (typeof initialIntent.input === 'string') setInput(initialIntent.input);
    if (initialIntent.templateName) {
      const nextTpl = GEN_TEMPLATES.find(t => t.name === initialIntent.templateName);
      if (nextTpl) setSelectedTpl(nextTpl);
    }
    setResults([]);
    setReviewText('');
  }, [initialIntent]);

  async function generate() {
    if (mode !== 'image' && !input.trim()) return;
    if (mode === 'image' && !selectedImageName && !selectedImage) return;
    setGenerating(true);
    setResults([]);
    setActiveIdx(0);
    try {
      let latestProfile = null;
      for (let i = 0; i < 3; i++) {
        const response = await window.MemeLabAPI.generate({
          mode,
          input,
          style,
          templateName: selectedTpl.name,
          imageName: selectedImageName,
          imageData: selectedImage,
          count: 1,
          variantOffset: i,
        });
        latestProfile = response.profile || latestProfile;
        const chunk = response.results || [];
        if (chunk.length) {
          setResults(prev => (prev || []).concat(chunk));
        }
      }
      onProfileSync(latestProfile, 15);
    } catch (e) {
      let lines = [];
      try {
        const styleMap = { cold: '冷漠系', crazy: '癫狂系', yy: '阴阳系', cute: '可爱系' };
        const prompt = `用户的吐槽是：「${input || selectedImageName}」请生成3个不同的梗图文案（风格：${styleMap[style]}）。每个最多15字。只输出3行：`;
        const r = await window.MockClaude.complete(prompt);
        lines = (r || '').split('\n').map(l => l.trim().replace(/^[-·0-9.、)】"]+\s*/, '').replace(/["]/g, '')).filter(Boolean).slice(0, 3);
      } catch (err) {}
      if (lines.length < 3) lines = ['那咋了 🫠', '班味浓郁 建议冷冻', '家人们 谁懂啊 💀'];
      const picked = [...GEN_TEMPLATES].sort(() => Math.random() - 0.5).slice(0, 3);
      setResults(lines.slice(0, 3).map((text, i) => ({ id: 'mock-' + i, text, template: picked[i] })));
      onProfileSync(null, 15);
    }
    setActiveIdx(0);
    setGenerating(false);
  }

  function onPickImage(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    setSelectedImageName(file.name);
    const reader = new FileReader();
    reader.onload = () => setSelectedImage(reader.result);
    reader.readAsDataURL(file);
  }

  async function publishCurrent() {
    const cur = results[activeIdx];
    if (!cur?.id) return;
    setActionLoading('publish');
    try {
      const response = await window.MemeLabAPI.publishMeme(cur.id);
      onProfileSync(response.profile, 10);
      onOpenPlaza();
    } finally {
      setActionLoading('');
    }
  }

  async function reviewCurrent() {
    const cur = results[activeIdx];
    if (!cur?.id) return;
    setActionLoading('review');
    try {
      const response = await window.MemeLabAPI.critiqueMeme(cur.id);
      setReviewText(response.critique || '这梗有点意思，可以再发酵一下。');
    } catch (e) {
      setReviewText('这梗我给你扬了 💀 先留着，回头再打磨。');
    } finally {
      setActionLoading('');
    }
  }

  async function shareCurrent() {
    const cur = results[activeIdx];
    if (!cur) return;
    setActionLoading('share');
    try {
      const response = cur.id?.startsWith('mock-')
        ? { downloadUrl: cur.dataUrl || cur.assetPath, shareText: cur.text }
        : await window.MemeLabAPI.shareMeme(cur.id);
      const url = resolveAssetUrl(response.downloadUrl || cur.assetPath || cur.dataUrl);
      if (url) {
        const link = document.createElement('a');
        link.href = url;
        const suffix = (url || '').toLowerCase().includes('.png') || (cur.assetPath || '').toLowerCase().includes('.png') ? '.png' : '.svg';
        link.download = 'memelab-' + Date.now() + suffix;
        link.click();
      }
    } finally {
      setActionLoading('');
    }
  }

  const modes = [
    { key: 'text', label: '一句话生梗', icon: '✍️' },
    { key: 'template', label: '模板填空', icon: '🧩' },
    { key: 'image', label: '图片改梗', icon: '🖼️' },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#FAFAFB' }}>
      <div style={{ padding: '8px 20px 4px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <button onClick={goBack} style={{
          width: 36, height: 36, borderRadius: '50%', background: '#F0F0F0',
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16,
        }}>‹</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 22, fontWeight: 800, lineHeight: 1.1 }}>造梗 ✨</div>
          <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>一句话，出梗图</div>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, padding: '10px 16px 6px' }}>
        {modes.map(m => (
          <button key={m.key} onClick={() => setMode(m.key)} style={{
            flex: 1, padding: '8px 4px', fontSize: 12, fontWeight: 600,
            borderRadius: 12,
            background: mode === m.key ? '#1A1A1A' : '#F0F0F0',
            color: mode === m.key ? '#fff' : '#666',
            transition: 'all 0.2s',
          }}>{m.icon} {m.label}</button>
        ))}
      </div>

      <div className="no-scroll" style={{ flex: 1, overflowY: 'auto', padding: '8px 16px 20px' }}>
        {mode === 'text' && (
          <>
            <textarea
              value={input}
              onChange={e => setInput(e.target.value)}
              placeholder="老板周五晚上6点在群里说加班…"
              style={{
                width: '100%', minHeight: 80, padding: 14,
                border: '2px solid #EDEDED', borderRadius: 16,
                fontSize: 14, fontFamily: 'inherit', outline: 'none',
                resize: 'none', lineHeight: 1.5,
              }}
            />
            <div style={{ fontSize: 11, color: '#888', margin: '10px 2px 6px', fontWeight: 600 }}>选个风格</div>
            <div className="no-scroll" style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 4 }}>
              {GEN_STYLES.map(s => (
                <button key={s.key} onClick={() => setStyle(s.key)} style={{
                  flexShrink: 0, padding: '7px 14px', borderRadius: 999, fontSize: 12, fontWeight: 600,
                  background: style === s.key ? '#1A1A1A' : '#F0F0F0',
                  color: style === s.key ? '#fff' : '#666',
                }}>{s.label}</button>
              ))}
            </div>

            <button onClick={generate} disabled={!input.trim() || generating} style={{
              width: '100%', padding: '14px', marginTop: 16,
              borderRadius: 16, fontSize: 15, fontWeight: 800,
              background: input.trim() && !generating
                ? 'linear-gradient(135deg, #7B5EA7, #5A3E8A)' : '#DDD',
              color: '#fff',
              boxShadow: input.trim() && !generating ? 'var(--shadow-purple)' : 'none',
            }}>
              {generating ? '梗图出炉中…' : '✨ 生成梗图'}
            </button>

            {generating && results.length === 0 && <GenSkeleton/>}
            {results.length > 0 && (
              <GenResults results={results} activeIdx={activeIdx} setActiveIdx={setActiveIdx}
                          originalInput={input} onRegen={generate}
                          onPublish={publishCurrent} onReview={reviewCurrent} onShare={shareCurrent}
                          actionLoading={actionLoading} level={level}/>
            )}
          </>
        )}

        {mode === 'template' && (
          <TemplateMode selectedTpl={selectedTpl} setSelectedTpl={setSelectedTpl} onGen={generate}
                        input={input} setInput={setInput} generating={generating}
                        results={results} activeIdx={activeIdx} setActiveIdx={setActiveIdx}
                        onPublish={publishCurrent} onReview={reviewCurrent} onShare={shareCurrent}
                        actionLoading={actionLoading} level={level}/>
        )}

        {mode === 'image' && (
          <ImageMode
            fileInputRef={fileInputRef}
            onPickImage={onPickImage}
            selectedImageName={selectedImageName}
            selectedImage={selectedImage}
            generating={generating}
            results={results}
            activeIdx={activeIdx}
            setActiveIdx={setActiveIdx}
            onGenerate={generate}
            onPublish={publishCurrent}
            onReview={reviewCurrent}
            onShare={shareCurrent}
            actionLoading={actionLoading}
            level={level}
          />
        )}
      </div>
      {reviewText && (
        <div className="fade-in" style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 20 }}
             onClick={() => setReviewText('')}>
          <div className="slide-up" onClick={e => e.stopPropagation()} style={{
            position: 'absolute', left: 0, right: 0, bottom: 0,
            background: '#fff', borderRadius: '28px 28px 0 0', padding: '16px 20px 28px',
          }}>
            <div style={{ width: 40, height: 4, background: '#E0E0E0', borderRadius: 999, margin: '4px auto 16px' }}/>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <DogeAvatar size={40} expression="smirk"/>
              <div>
                <div style={{ fontSize: 15, fontWeight: 800 }}>梗王点评</div>
                <div style={{ fontSize: 12, color: '#888', marginTop: 2 }}>真实后端返回</div>
              </div>
            </div>
            <div style={{ marginTop: 14, padding: 14, borderRadius: 16, background: '#F0EBFA', fontSize: 14, lineHeight: 1.6 }}>
              {reviewText}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TemplateMode({ selectedTpl, setSelectedTpl, onGen, input, setInput, generating, results, activeIdx, setActiveIdx, onPublish, onReview, onShare, actionLoading, level }) {
  return (
    <>
      <div style={{ fontSize: 11, color: '#888', margin: '2px 2px 8px', fontWeight: 600 }}>选一个模板</div>

  { key: 'southeast-asia', name: '东南亚', lat: 6, lon: 106, color: '#BA68C8', desc: '表情包搬运和短视频语境传播活跃。' },
  { key: 'oceania', name: '大洋洲', lat: -25, lon: 133, color: '#64B5F6', desc: '英语圈二次扩散补充节点。' },
  { key: 'south-america', name: '南美', lat: -15, lon: -60, color: '#F06292', desc: '西语/葡语圈 meme 的再演绎区域。' },
  { key: 'africa-middle-east', name: '中东非洲', lat: 10, lon: 26, color: '#FFB74D', desc: '跨平台扩散节点与外溢传播。' },
  { key: 'global', name: '全球混合', lat: 0, lon: 0, color: '#90A4AE', desc: '来源未知或多地混合传播的梗图。' },
];

function inferWorldRegion(post) {
  const source = (post.source || '').toLowerCase();
  const label = `${post.sourceLabel || ''} ${post.community || ''} ${post.caption || ''}`.toLowerCase();
  if (source === 'builtin-animal' || source === 'memelab') return 'east-asia';
  if (label.includes('india') || label.includes('tcs')) return 'south-asia';
  if (source === 'lemmy') return 'europe';
  if (source === 'meme-api' || label.includes('reddit') || label.includes('dankmemes')) return 'north-america';
  if (label.includes('singapore') || label.includes('indonesia') || label.includes('philippines')) return 'southeast-asia';
  if (label.includes('australia') || label.includes('new zealand')) return 'oceania';
  if (label.includes('brazil') || label.includes('argentina') || label.includes('mexico')) return 'south-america';
  if (label.includes('dubai') || label.includes('africa') || label.includes('egypt')) return 'africa-middle-east';
  return 'global';
}

function buildWorldRegions(posts) {
  const buckets = {};
  WORLD_REGION_SEEDS.forEach(region => {
    buckets[region.key] = { ...region, count: 0, posts: [] };
  });
  posts.forEach(post => {
    const key = inferWorldRegion(post);
    const bucket = buckets[key] || buckets.global;
    bucket.count += 1;
    if (bucket.posts.length < 8) bucket.posts.push(post);
  });
  return Object.values(buckets)
    .filter(region => region.count > 0 || region.key === 'global')
    .sort((a, b) => b.count - a.count);
}

function projectGlobePoint(lat, lon, rotationDeg, radius, cx, cy) {
  const latRad = lat * Math.PI / 180;
  const lonRad = (lon + rotationDeg) * Math.PI / 180;
  const x = Math.cos(latRad) * Math.sin(lonRad);
  const y = Math.sin(latRad);
  const z = Math.cos(latRad) * Math.cos(lonRad);
  return {
    x: cx + x * radius,
    y: cy - y * radius,
    z,
    visible: z > -0.25,
    scale: 0.6 + Math.max(z, -0.25) * 0.4,
  };
}

function GlobeCanvas({ regions, activeKey, onSelect }) {
  const canvasRef = React.useRef(null);
  const frameRef = React.useRef(null);
  const rotationRef = React.useRef(-35);
  const dragRef = React.useRef({ down: false, startX: 0, startRot: 0 });
  const hitRegionsRef = React.useRef([]);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const width = 320;
    const height = 320;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    function draw() {
      const w = width;
      const h = height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = 118;
      const rotationDeg = rotationRef.current;
      ctx.clearRect(0, 0, w, h);

      const glow = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius + 42);
      glow.addColorStop(0, 'rgba(123,94,167,0.15)');
      glow.addColorStop(1, 'rgba(123,94,167,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);

      const sphere = ctx.createRadialGradient(cx - 34, cy - 42, 12, cx, cy, radius);
      sphere.addColorStop(0, '#FFFFFF');
      sphere.addColorStop(0.18, '#DFF2FF');
      sphere.addColorStop(0.55, '#8AB6E8');
      sphere.addColorStop(1, '#223C66');
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = sphere;
      ctx.fill();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();

      for (let lat = -60; lat <= 60; lat += 30) {
        ctx.beginPath();
        for (let lon = -180; lon <= 180; lon += 10) {
          const point = projectGlobePoint(lat, lon, rotationDeg, radius, cx, cy);
          if (lon === -180) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.16)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      for (let lon = -150; lon <= 180; lon += 30) {
        ctx.beginPath();
        for (let lat = -80; lat <= 80; lat += 6) {
          const point = projectGlobePoint(lat, lon, rotationDeg, radius, cx, cy);
          if (lat === -80) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();

      hitRegionsRef.current = [];
      regions.forEach(region => {
        const point = projectGlobePoint(region.lat, region.lon, rotationDeg, radius, cx, cy);
        if (!point.visible) return;
        const dotSize = 4 + Math.min(12, region.count * 0.22);
        const active = activeKey === region.key;
        hitRegionsRef.current.push({ key: region.key, x: point.x, y: point.y, r: dotSize + 6 });
        ctx.beginPath();
        ctx.arc(point.x, point.y, dotSize * 1.8, 0, Math.PI * 2);
        ctx.fillStyle = active ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.1)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(point.x, point.y, dotSize, 0, Math.PI * 2);
        ctx.fillStyle = region.color;
        ctx.shadowColor = region.color;
        ctx.shadowBlur = active ? 18 : 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1.2;
      ctx.stroke();

      rotationRef.current += dragRef.current.down ? 0 : 0.16;
      frameRef.current = requestAnimationFrame(draw);
    }

    draw();
    return () => {
      if (frameRef.current) cancelAnimationFrame(frameRef.current);
    };
  }, [regions, activeKey]);

  function pickRegion(clientX, clientY) {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const hit = hitRegionsRef.current
      .map(item => ({ ...item, d: Math.hypot(item.x - x, item.y - y) }))
      .filter(item => item.d <= item.r)
      .sort((a, b) => a.d - b.d)[0];
    if (hit) onSelect(hit.key);
  }

  return (
    <canvas
      ref={canvasRef}
      onMouseDown={e => { dragRef.current = { down: true, startX: e.clientX, startRot: rotationRef.current }; }}
      onMouseMove={e => {
        if (!dragRef.current.down) return;
        rotationRef.current = dragRef.current.startRot + (e.clientX - dragRef.current.startX) * 0.45;
      }}
      onMouseUp={() => { dragRef.current.down = false; }}
      onMouseLeave={() => { dragRef.current.down = false; }}
      onClick={e => pickRegion(e.clientX, e.clientY)}
      style={{ width: 320, height: 320, display: 'block', margin: '0 auto', cursor: 'grab' }}
    />
  );
}

function GameScreen({ onProfileSync, points, level, persona, onOpenGen, onOpenPlaza }) {
  const [profile, setProfile] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [panel, setPanel] = React.useState('profile');
  const [mode, setMode] = React.useState('fill');
  const [view, setView] = React.useState('menu');
  const [currentLevel, setCurrentLevel] = React.useState(0);
  const [answer, setAnswer] = React.useState('');
  const [timeLeft, setTimeLeft] = React.useState(30);
  const [scoring, setScoring] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [levels, setLevels] = React.useState(GAME_LEVELS);
  const [heatmap, setHeatmap] = React.useState([]);
  const [resultLevel, setResultLevel] = React.useState(null);

  React.useEffect(() => {
    let alive = true;
    setLoading(true);
    Promise.all([
      window.MemeLabAPI.getMyProfile().catch(() => null),
      window.MemeLabAPI.getGameLevels().catch(() => null),
    ])
      .then(([profileData, gameData]) => {
        if (!alive) return;
        if (profileData?.profile) setProfile(profileData.profile);
        if (gameData?.gameLevels?.length) setLevels(gameData.gameLevels);
        if (gameData?.heatmap?.length) setHeatmap(gameData.heatmap);
      })
      .finally(() => alive && setLoading(false));
    return () => { alive = false; };
  }, []);

  const modeLevels = levels.filter(item => item.mode === mode);
  const activeLevel = modeLevels[currentLevel] || modeLevels[0] || GAME_LEVELS[0];

  React.useEffect(() => {
    if (view !== 'playing' || scoring) return;
    if (timeLeft <= 0) { submit(); return; }
    const timer = setTimeout(() => setTimeLeft(v => v - 1), 1000);
    return () => clearTimeout(timer);
  }, [view, timeLeft, scoring, mode, currentLevel]);

  const summary = profile || {
    userName: '梗员01',
    avatar: '🐶',
    bio: '本人主页 · 正在把真实梗图和真实互动都卷起来',
    counts: { posts: 0, followers: 0, following: 0, liked: 0 },
    posts: [],
    recentComments: [],
  };

  function startGame(nextMode = mode, nextIndex = 0) {
    setMode(nextMode);
    setCurrentLevel(nextIndex);
    setAnswer('');
    setTimeLeft(30);
    setResult(null);
    setResultLevel(null);
    setPanel('challenge');
    setView('playing');
  }

  async function submit() {
    if (scoring) return;
    setScoring(true);
    const userAns = answer.trim() || '（没写完）';
    try {
      const response = await window.MemeLabAPI.scoreGame({ mode, levelId: activeLevel.id, answer: userAns });
      setResult(response.result);
      setResultLevel(response.level || activeLevel);
      if (response.heatmap?.length) setHeatmap(response.heatmap);
      onProfileSync(response.profile, response.result?.grade?.startsWith('A') ? 15 : 5);
    } catch (e) {
      let parsed = { grade: 'B', humor: 70, contrast: 70, fit: 70, comment: '还行，下次更好', userAns };
      try {
        const prompt = `梗游戏评分。情境：「${activeLevel.setup}」，图是：${activeLevel.imagePrompt}。用户填的梗文案是：「${userAns}」。返回JSON：{"grade":"A+/A/B/C","humor":0-100,"contrast":0-100,"fit":0-100,"comment":"一句中文点评"}`;
        const r = await window.MockClaude.complete(prompt);
        const m = (r || '').match(/\{[\s\S]*\}/);
        if (m) parsed = { ...parsed, ...JSON.parse(m[0]), userAns };
      } catch (err) {}
      setResult(parsed);
      setResultLevel(activeLevel);
      onProfileSync(null, parsed.grade?.startsWith('A') ? 15 : 5);
    }
    setScoring(false);
    setView('result');
  }

  if (panel === 'challenge' && view === 'playing') {
    return <PlayingView level={activeLevel} timeLeft={timeLeft} answer={answer}
                        setAnswer={setAnswer} onSubmit={submit} scoring={scoring}
                        onBack={() => { setPanel('challenge'); setView('menu'); }}/>;
  }
  if (panel === 'challenge' && view === 'result') {
    return <ResultView level={resultLevel || activeLevel} result={result}
                       onNext={() => startGame(mode, (currentLevel + 1) % Math.max(1, modeLevels.length))}
                       onBack={() => setView('menu')}/>;

    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#FAFAFB' }}>

      <div className="no-scroll" style={{ flex: 1, overflowY: 'auto', padding: '10px 16px 110px' }}>

            <div style={{ background: '#fff', borderRadius: 20, padding: 16, boxShadow: 'var(--shadow-card)' }}>

              <button onClick={() => onOpenGen({ mode: 'text' })} style={{

function Heatmap({ cells = [] }) {
  const palette = ['#F0F0F0', '#FAD9B0', '#F5A623', '#E07B00', '#B85C00'];
  const safeCells = cells.length ? cells : Array.from({ length: 56 }).map(() => Math.floor(Math.random() * 4));
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(14, 1fr)', gap: 3 }}>
      {safeCells.map((c, i) => (
        <div key={i} style={{ aspectRatio: '1', background: palette[c] || palette[0], borderRadius: 4 }}/>
      ))}
    </div>
  );
}

function GameCard({ accent, icon, title, desc, meta, onClick, primary }) {
  const bgColors = { purple: '#EEE6FA', red: '#FDE6E4', green: '#DFF4E7' };
  return (
    <button onClick={onClick} className={`grad-border ${accent}`} style={{
      padding: '14px 16px', textAlign: 'left', display: 'flex', alignItems: 'center', gap: 12,
    }}>
      <div style={{
        width: 48, height: 48, borderRadius: '50%', background: bgColors[accent],
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 24, flexShrink: 0,
      }}>{icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ fontSize: 15, fontWeight: 700 }}>{title}</div>
          {primary && <span style={{ fontSize: 9, fontWeight: 700, color: '#fff', background: 'var(--red)', padding: '2px 6px', borderRadius: 999 }}>HOT</span>}
        </div>
        <div style={{ fontSize: 12, color: '#666', marginTop: 3 }}>{desc}</div>
        <div style={{ fontSize: 10, color: '#AAA', marginTop: 4 }}>{meta}</div>
      </div>
      <span style={{ color: '#BBB', fontSize: 20 }}>›</span>
    </button>
  );
}

          <button onClick={onBack} style={{

        <div style={{ fontSize: 11, fontWeight: 700, color: '#8B6914', marginBottom: 4 }}>情境</div>

      </div>

function ResultView({ level, result, onNext, onBack }) {

  const gradeColors = {
    'A+': { bg: 'linear-gradient(135deg, #FFD700, #FF6B6B)', fg: '#fff' },
    'A': { bg: 'linear-gradient(135deg, #52C17A, #2E9E59)', fg: '#fff' },
    'B': { bg: 'linear-gradient(135deg, #4A8FE7, #2E6FCC)', fg: '#fff' },
    'C': { bg: 'linear-gradient(135deg, #AAA, #777)', fg: '#fff' },

  const gc = gradeColors[result.grade] || gradeColors.B;
  const isGood = result.grade?.startsWith('A');

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#FAFAFB', padding: '14px 16px' }}>
      <div style={{ textAlign: 'center', marginBottom: 10 }}>
        <div className="pop-in" style={{
          display: 'inline-block', background: gc.bg, color: gc.fg,
          padding: '12px 32px', borderRadius: 999,
          fontSize: 28, fontWeight: 900,
          boxShadow: '0 8px 24px rgba(0,0,0,0.15)',
        }}>{result.grade}</div>
        <div style={{ fontSize: 14, fontWeight: 700, marginTop: 10 }}>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 10 }}>
        <ScoreBar label="幽默度" value={result.humor} color="var(--red)"/>
        <ScoreBar label="反差度" value={result.contrast} color="var(--blue)"/>
        <ScoreBar label="契合度" value={result.fit} color="var(--green)"/>

      <div style={{
        background: '#F0EBFA', borderRadius: 14, padding: 12,
        display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 10,
      }}>
        <div style={{ flexShrink: 0 }}>
          <DogeAvatar size={36} expression="smirk"/>
        </div>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--purple)' }}>梗王点评</div>
          <div style={{ fontSize: 13, marginTop: 3 }}>{result.comment}</div>
          {result.source && (
            <div style={{ fontSize: 10, color: '#888', marginTop: 6 }}>
              {result.source === 'modelscope' ? 'Kimi-K2.5 实时评分' : '本地兜底评分'}
            </div>
          )}
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 700, color: '#888', margin: '4px 0 8px' }}>本关 TOP 答案</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {level.topAnswers.map((a, i) => (
          <div key={i} style={{
            background: '#fff', borderRadius: 12, padding: '10px 12px',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            fontSize: 12,
          }}>
            <span>{a.text}</span>
            <span style={{ color: 'var(--green)', fontWeight: 700 }}>{a.score} · {a.votes}👍</span>
          </div>

      <div style={{ flex: 1 }}/>

        }}>返回</button>

  );
}

function ScoreBar({ label, value, color }) {
  return (
    <div style={{ background: '#fff', borderRadius: 12, padding: '10px 10px 8px' }}>
      <div style={{ fontSize: 10, color: '#888', fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color, fontFamily: 'var(--font-num)', marginTop: 2 }}>{value}</div>
      <div style={{ height: 4, background: '#F0F0F0', borderRadius: 2, marginTop: 4, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${value}%`, background: color, borderRadius: 2, transition: 'width 0.6s' }}/>
      </div>
    </div>
  );
}

// ========== App ==========
function App() {
  const [tab, setTab] = React.useState('plaza');
  const [persona, setPersonaState] = React.useState(PERSONAS.default);
  const [points, setPoints] = React.useState(185);
  const [level, setLevel] = React.useState('🥇 黄金梗师');
  const [pointFloat, setPointFloat] = React.useState(null);
  const [genIntent, setGenIntent] = React.useState(null);

  React.useEffect(() => {
    let alive = true;
    window.MemeLabAPI.getBootstrap()
      .then(data => {
        if (!alive || !data?.profile) return;
        syncProfile(data.profile, 0);
        if (data.profile.personaKey && PERSONAS[data.profile.personaKey]) {
          setPersonaState(PERSONAS[data.profile.personaKey]);
        }
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);

  function setPersona(p) { setPersonaState(p); }

  function showPointFloat(n) {
    if (!n) return;
    const id = Date.now();
    setPointFloat({ n, id });
    setTimeout(() => setPointFloat(f => f && f.id === id ? null : f), 1200);
  }

  function syncProfile(profile, fallbackGain = 0) {
    if (profile && typeof profile.points === 'number') {
      setPoints(prev => {
        const delta = profile.points - prev;
        if (delta) showPointFloat(delta);
        return profile.points;
      });
      if (profile.level) setLevel(profile.level);
      if (profile.personaKey && PERSONAS[profile.personaKey]) setPersonaState(PERSONAS[profile.personaKey]);
      return;
    }
    if (fallbackGain) {
      setPoints(prev => prev + fallbackGain);
      showPointFloat(fallbackGain);
    }
  }

  function openGen(intent) {
    setGenIntent({ ...(intent || {}), stamp: Date.now() });
    setTab('gen');
  }

  const tabs = [
    { key: 'king', label: '梗王', icon: '🤴' },
    { key: 'world', label: '世界', icon: '🌍' },
    { key: 'plaza', label: '广场', icon: '🔥', center: true },
    { key: 'gen', label: '造梗', icon: '✨' },
    { key: 'game', label: '我的', icon: '👤' },
  ];

  const screen = (() => {
    if (tab === 'king') return <MemeKingHome persona={persona} setPersona={setPersona}
                                              onProfileSync={syncProfile} points={points} level={level}/>;
    if (tab === 'world') return <WorldScreen onOpenGen={openGen} onOpenPlaza={() => setTab('plaza')}/>;
    if (tab === 'plaza') return <Plaza onProfileSync={syncProfile} onOpenGen={openGen}/>;
    if (tab === 'gen') return <Generator onProfileSync={syncProfile} goBack={() => setTab('plaza')}
                                         onOpenPlaza={() => setTab('plaza')} initialIntent={genIntent} level={level}/>;
    if (tab === 'game') return <GameScreen onProfileSync={syncProfile} points={points} level={level} persona={persona} onOpenGen={openGen}
                                           onOpenPlaza={() => setTab('plaza')}/>;
  })();

  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '24px', gap: 40,
      background: 'radial-gradient(circle at 30% 20%, #F2EDFB, #E9E9EE 60%)',
    }}>
      <div style={{ position: 'relative' }}>
        <IOSDevice width={398} height={820} dark={false}>
          <div style={{ position: 'relative', height: '100%', paddingTop: 52, background: '#FAFAFB' }}>
            <div style={{ height: 'calc(100% - 72px)', overflow: 'hidden', position: 'relative' }}>
              {screen}
            </div>
            <TabBar tabs={tabs} current={tabs.some(item => item.key === tab) ? tab : 'plaza'} onChange={setTab}/>
            {pointFloat && <PointFloat n={pointFloat.n} show={true}/>}
          </div>
        </IOSDevice>

        <div style={{ textAlign: 'center', marginTop: 16, fontSize: 12, color: '#888', letterSpacing: 1 }}>
          造梗局 · MEMELAB PROTOTYPE
        </div>
      </div>

      <SideInfo tab={tab} points={points} persona={persona} setPersona={setPersona} level={level}/>
    </div>
  );
}

function TabBar({ tabs, current, onChange }) {
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      height: 72,
      background: '#fff',
      borderTop: '1px solid #EEE',
      boxShadow: '0 -2px 12px rgba(0,0,0,0.04)',
      display: 'grid', gridTemplateColumns: '1fr 1fr 1.25fr 1fr 1fr',
      alignItems: 'center', padding: '0 14px 12px', zIndex: 20,
    }}>
      {tabs.map(t => {
        const active = current === t.key;
        return (
          <button key={t.key} onClick={() => onChange(t.key)} style={{
            justifySelf: t.center ? 'center' : 'stretch',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
            padding: active ? (t.center ? '10px 18px' : '8px 12px') : (t.center ? '9px 16px' : '8px 10px'),
            borderRadius: 999,
            background: active ? '#1A1A1A' : 'transparent',
            color: active ? '#fff' : '#AAA',
            minWidth: t.center ? 96 : 0,
            transition: 'all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)',
          }}>
            <span style={{ fontSize: t.center ? 19 : 18 }}>{t.icon}</span>
            {active && <span style={{ fontSize: 12, fontWeight: 700 }}>{t.label}</span>}
          </button>
        );
      })}
    </div>
  );
}

function SideInfo({ tab, points, persona, setPersona, level }) {
  const [hide, setHide] = React.useState(typeof window !== 'undefined' && window.innerWidth < 900);
  React.useEffect(() => {
    function onResize() { setHide(window.innerWidth < 900); }
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const titles = {
    king: { t: '梗王智能体', d: '首页对话，AI真实生成。点🎭换人格（默认/东北/文言）。' },
